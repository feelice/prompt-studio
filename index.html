<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Studio v0.5 beta · 多模型 / 多 Agent Prompt 生成器</title>
<style>
  :root{
    --bg:#0f1117;--panel:#161922;--panel2:#1d212d;--line:#2a3040;
    --txt:#e6e8ee;--muted:#9aa3b2;--accent:#6c8cff;--accent2:#3ddc97;--warn:#ffb454;
    --radius:12px;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.55}
  header{padding:18px 28px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#171a24,#0f1117);
    display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{margin:0;font-size:19px;font-weight:650}
  header p{margin:5px 0 0;color:var(--muted);font-size:12.5px}
  .lang{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .lang button{background:transparent;border:none;color:var(--muted);padding:6px 14px;font-size:13px;cursor:pointer}
  .lang button.on{background:var(--accent);color:#fff}
  .wrap{max-width:1280px;margin:0 auto;padding:22px;display:grid;grid-template-columns:392px 1fr;gap:20px}
  @media(max-width:940px){.wrap{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px}
  .card h2{margin:0 0 3px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--accent)}
  .card .sub{color:var(--muted);font-size:12px;margin:0 0 13px}
  .types{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .type{border:1px solid var(--line);background:var(--panel2);border-radius:10px;padding:11px;cursor:pointer;transition:.15s}
  .type:hover{border-color:var(--accent)}
  .type.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;background:#1b2030}
  .type .ico{font-size:18px}.type .t{font-weight:600;font-size:13.5px;margin-top:3px}
  .type .d{color:var(--muted);font-size:11px;margin-top:2px}
  label{display:block;font-size:12px;color:var(--muted);margin:13px 0 5px}
  select,input,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;resize:vertical}
  textarea{min-height:58px;line-height:1.5}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .levels{display:flex;gap:8px;margin-top:6px}
  .lvl{flex:1;text-align:center;border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:8px;cursor:pointer;font-size:13px;transition:.15s}
  .lvl.active{border-color:var(--accent2);color:var(--accent2);background:#15241d}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  button.act{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer}
  button.ghost:hover{border-color:var(--accent)}
  .out-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .out-head .tag{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);padding:3px 9px;border-radius:20px}
  pre.output{background:#0b0d13;border:1px solid var(--line);border-radius:10px;padding:16px;font-family:var(--mono);
    font-size:12.5px;white-space:pre-wrap;word-break:break-word;max-height:440px;overflow:auto;margin:0}
  .spec{margin-top:16px;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--warn);border-radius:8px;padding:14px 16px;font-size:12.5px;color:#d6dae3}
  .spec h3{margin:0 0 8px;font-size:12px;color:var(--warn);text-transform:uppercase;letter-spacing:1px}
  .spec ul{margin:0;padding-left:18px}.spec li{margin:4px 0}
  .var-hint{font-size:11px;color:var(--muted);margin-top:8px}
  .var-hint code{background:#0b0d13;padding:1px 5px;border-radius:4px;color:var(--accent2)}
  .count{font-size:11px;color:var(--muted);margin-top:6px}
  .chips{margin:7px 0 2px}
  .chipgrp{margin:6px 0}
  .chipgrp .gl{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
  .chip{display:inline-block;border:1px solid var(--line);background:#11141d;color:var(--muted);border-radius:14px;padding:3px 9px;font-size:11px;margin:0 5px 5px 0;cursor:pointer;transition:.12s;user-select:none}
  .chip:hover{border-color:var(--accent);color:var(--txt)}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#06150f;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  footer{text-align:center;color:var(--muted);font-size:11px;padding:18px}
  footer a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <div><h1 style="display:flex;align-items:center;gap:10px"><span id="appTitle"></span><span id="verBadge" style="font-size:11px;font-weight:600;color:var(--accent2);border:1px solid var(--accent2);border-radius:20px;padding:2px 9px;white-space:nowrap"></span></h1><p id="appSub"></p></div>
  <div class="lang">
    <button id="zhBtn" class="on" onclick="setLang('zh')">中文</button>
    <button id="enBtn" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="wrap">
  <div>
    <div class="card">
      <h2 id="impTitle"></h2><p class="sub" id="impSub"></p>
      <textarea id="importText" style="min-height:92px"></textarea>
      <label id="impCatLabel"></label>
      <select id="importCat">
        <option value="auto"></option>
        <option value="llm"></option>
        <option value="roles"></option>
        <option value="coding"></option>
        <option value="automation"></option>
        <option value="image"></option>
        <option value="prompteng"></option>
      </select>
      <div class="row">
        <button class="act" id="impParse"></button>
        <button class="ghost" id="impMeta"></button>
      </div>
    </div>
    <div class="card">
      <h2 id="t1"></h2><p class="sub" id="t1s"></p>
      <div class="types" id="types"></div>
    </div>
    <div class="card">
      <h2 id="t2"></h2><p class="sub" id="t2s"></p>
      <label id="lSearch"></label>
      <input id="search" type="search" autocomplete="off" autocorrect="off" spellcheck="false">
      <label id="lScenario"></label>
      <select id="scenario"></select>
      <div class="count" id="count"></div>
      <div id="fields"></div>
      <p class="var-hint" id="varHint"></p>
    </div>
    <div class="card">
      <h2 id="t3"></h2><p class="sub" id="t3s"></p>
      <div class="levels" id="levels">
        <div class="lvl" data-lvl="lite"></div>
        <div class="lvl active" data-lvl="std"></div>
        <div class="lvl" data-lvl="full"></div>
      </div>
      <div class="row">
        <button class="act" id="gen"></button>
        <button class="ghost" id="reset"></button>
      </div>
    </div>
    <div class="card">
      <h2 id="savedTitle"></h2><p class="sub" id="savedSub"></p>
      <select id="savedList"></select>
      <div class="count" id="savedCount"></div>
      <div class="row">
        <button class="act" id="saveBtn"></button>
        <button class="ghost" id="loadBtn"></button>
        <button class="ghost" id="delBtn"></button>
      </div>
    </div>
  </div>

  <div>
    <div class="card">
      <div class="out-head"><h2 style="margin:0" id="outTitle"></h2><span class="tag" id="outTag">—</span></div>
      <pre class="output" id="output"></pre>
      <div class="row">
        <button class="act" id="copy"></button>
        <button class="ghost" id="copySpec"></button>
        <button class="ghost" id="dl"></button>
        <button class="ghost" id="expFoo"></button>
        <button class="ghost" id="expDspy"></button>
      </div>
      <div class="spec" id="spec" style="display:none">
        <h3 id="specTitle"></h3><div id="specBody"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<footer id="footer"></footer>

  if(cat==="image") return (DICT.image[fk])||[];
  if(cat==="coding"&&fk==="constraints") return DICT.coding.constraints;
  return (DICT._text[fk])||[];
}

/* ================= 状态与逻辑 ================= */
const VERSION="v0.5 beta";  /* dictionary release */
let lang="zh", state={type:"llm",idx:0,level:"std",fields:{},custom:false};
const $=s=>document.querySelector(s);
const L=()=>I18N[lang];
const CATKEYS=["llm","roles","coding","automation","image","prompteng"];

function setLang(l){lang=l;document.documentElement.lang=l==="zh"?"zh-CN":"en";
  $("#zhBtn").classList.toggle("on",l==="zh");$("#enBtn").classList.toggle("on",l==="en");
  renderStatic();renderTypes();renderScenarios(true);generate();}

function renderStatic(){
  const x=L();
  $("#appTitle").textContent=x.title;$("#appSub").textContent=x.sub;$("#verBadge").textContent=VERSION;
  $("#t1").textContent=x.t1;$("#t1s").textContent=x.t1s;
  $("#t2").textContent=x.t2;$("#t2s").textContent=x.t2s;
  $("#lSearch").textContent=x.search;$("#lScenario").textContent=x.scenario;
  $("#varHint").innerHTML=x.varHint.replace(/\{[^}]+\}/,m=>`<code>${m}</code>`);
  $("#t3").textContent=x.t3;$("#t3s").textContent=x.t3s;
  document.querySelector('.lvl[data-lvl=lite]').textContent=x.lite;
  document.querySelector('.lvl[data-lvl=std]').textContent=x.std;
  document.querySelector('.lvl[data-lvl=full]').textContent=x.full;
  $("#gen").textContent=x.gen;$("#reset").textContent=x.reset;
  $("#outTitle").textContent=x.outTitle;$("#copy").textContent=x.copy;
  $("#copySpec").textContent=x.copySpec;$("#dl").textContent=x.dl;
  $("#specTitle").textContent=x.specTitle;$("#footer").textContent=x.footer;
  $("#search").placeholder=x.search;
  $("#impTitle").textContent=x.impTitle;$("#impSub").textContent=x.impSub;
  $("#impCatLabel").textContent=x.impCatLabel;$("#importText").placeholder=x.impPlaceholder;
  $("#impParse").textContent=x.impParse;$("#impMeta").textContent=x.impMeta;
  const ic=$("#importCat");ic.options[0].textContent=x.impCatAuto;
  CATKEYS.forEach((k,i)=>ic.options[i+1].textContent=CATS[k].name[lang]);
  $("#savedTitle").textContent=x.savedTitle;$("#savedSub").textContent=x.savedSub;
  $("#saveBtn").textContent=x.saveBtn;$("#loadBtn").textContent=x.loadBtn;$("#delBtn").textContent=x.delBtn;
  $("#expFoo").textContent=x.expFoo;$("#expDspy").textContent=x.expDspy;
  renderSaved();
  if(!$("#output").dataset.gen) $("#output").textContent=x.placeholder;
}
function renderTypes(){
  const el=$("#types");el.innerHTML="";
  Object.entries(CATS).forEach(([k,v])=>{
    const d=document.createElement("div");
    d.className="type"+(k===state.type?" active":"");
    d.innerHTML=`<div class="ico">${v.ico}</div><div class="t">${v.name[lang]}</div><div class="d">${v.desc[lang]}</div>`;
    d.onclick=()=>{state.type=k;state.idx=0;state.custom=false;$("#search").value="";renderTypes();renderScenarios(true);};
    el.appendChild(d);
  });
}
function renderScenarios(reset){
  const list=TPL[state.type], q=$("#search").value.trim().toLowerCase();
  const sel=$("#scenario");sel.innerHTML="";
  if(state.custom){const o=document.createElement("option");o.value="-1";o.textContent="✨ "+L().customName;sel.appendChild(o);}
  let shown=0;
  list.forEach((t,i)=>{
    if(q && !t.name[lang].toLowerCase().includes(q)) return;
    const o=document.createElement("option");o.value=i;o.textContent=t.name[lang];sel.appendChild(o);shown++;
  });
  $("#count").textContent=L().count(shown);
  if(state.custom){sel.value="-1";renderFields();return;}
  if(reset || !Array.from(sel.options).some(o=>+o.value===state.idx)){
    state.idx = sel.options.length? +sel.options[0].value : 0;
  }
  sel.value=state.idx;loadTemplate();
}
function loadTemplate(){
  if(state.idx<0){renderFields();return;}
  const t=TPL[state.type][state.idx];
  state.fields={};
  CATS[state.type].fields.forEach(f=>state.fields[f.k]=t.v[f.k]?t.v[f.k][lang]:"");
  renderFields();
}
function renderFields(){
  const el=$("#fields");el.innerHTML="";
  CATS[state.type].fields.forEach(f=>{
    const lab=document.createElement("label");lab.textContent=f.l[lang];
    const ta=document.createElement("textarea");ta.value=state.fields[f.k]||"";
    ta.oninput=e=>state.fields[f.k]=e.target.value;
    el.appendChild(lab);el.appendChild(ta);
    const groups=getChips(state.type,f.k);
    if(groups.length){
      const box=document.createElement("div");box.className="chips";
      groups.forEach(grp=>{
        const gd=document.createElement("div");gd.className="chipgrp";
        const gl=document.createElement("div");gl.className="gl";gl.textContent=(grp.g[lang]||grp.g.zh||"");gd.appendChild(gl);
        grp.items.forEach(it=>{
          const c=document.createElement("span");c.className="chip";c.textContent=it[lang];
          if((state.fields[f.k]||"").includes(it[lang])) c.classList.add("on");
          c.onclick=()=>toggleChip(f.k,it[lang]);
          gd.appendChild(c);
        });
        box.appendChild(gd);
      });
      el.appendChild(box);
    }
  });
}
function toggleChip(k,txt){
  let cur=state.fields[k]||"";
  if(cur.includes(txt)){
    cur=cur.split(txt).join("");
  }else{
    const sep=state.type==="image"?", ":(lang==="zh"?"；":"; ");
    cur=cur.trim()?(cur.replace(/[\s,，;；]+$/,"")+sep+txt):txt;
  }
  cur=cur.replace(/(?:\s*[,，;；]\s*){2,}/g,()=>state.type==="image"?", ":(lang==="zh"?"；":"; "))
         .replace(/^[\s,，;；]+/,"").replace(/[\s,，;；]+$/,"");
  state.fields[k]=cur;renderFields();
}
const g=k=>(state.fields[k]||"").trim();

function generate(){
  const x=L();let text;
  if(state.type==="image"){
    const pos=[g("task"),g("role"),g("context")].filter(Boolean).join(", ");
    if(state.level==="lite") text=pos;
    else{text=x.imgPos+"\n"+pos;
      if(g("constraints")) text+="\n\n"+x.imgNeg+"\n"+g("constraints");
      if(g("output")) text+="\n\n"+x.imgParam+"\n"+g("output");
      if(state.level==="full") text+="\n\n"+x.imgTip+"\n"+x.imgTipBody;}
  }else{
    if(state.level==="lite"){
      text=[g("role"),g("task"),g("constraints")].filter(Boolean).join("\n");
    }else{
      let p=[];
      if(g("role")) p.push(g("role"));
      if(g("task")) p.push(x.secTask+"\n"+g("task"));
      if(g("context")) p.push(x.secContext+"\n"+g("context"));
      if(g("constraints")) p.push(x.secConstraints+"\n"+g("constraints"));
      if(g("output")) p.push(x.secOutput+"\n"+g("output"));
      if(state.level==="full") p.push(x.secExec+"\n"+x.execBody);
      text=p.join("\n\n");
    }
  }
  const out=$("#output");out.textContent=text||x.emptyFill;out.dataset.gen="1";
  const lvlName={lite:x.lite,std:x.std,full:x.full}[state.level];
  const scnName = state.idx<0 ? L().customName : TPL[state.type][state.idx].name[lang];
  $("#outTag").textContent=`${CATS[state.type].name[lang]} · ${scnName} · ${lvlName}`;
  $("#specBody").innerHTML="<ul>"+SPECS[state.type].map(s=>`<li>${s[lang]}</li>`).join("")+"</ul>";
  $("#spec").style.display="block";
}
function specText(){return SPECS[state.type].map(s=>"- "+s[lang]).join("\n");}

function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1400);}
function copyText(txt){navigator.clipboard.writeText(txt).then(()=>toast(L().copied),()=>toast(L().copyFail));}
function dlFile(name,txt,mime){
  const blob=new Blob([txt],{type:mime||"text/plain"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);
}
function download(){
  const head=`# ${$("#outTag").textContent}\n\n`;
  const body=$("#output").textContent+"\n\n## "+L().specTitle+"\n"+specText()+"\n";
  dlFile("prompt.md",head+body,"text/markdown");
}

/* ===== 本地保存 / 收藏 (localStorage) ===== */
const SKEY="ps_saved_v1";
function getSaved(){try{return JSON.parse(localStorage.getItem(SKEY))||[]}catch(e){return[]}}
function setSaved(a){try{localStorage.setItem(SKEY,JSON.stringify(a))}catch(e){}}
function renderSaved(){
  const sel=$("#savedList");if(!sel)return;
  const arr=getSaved();sel.innerHTML="";
  if(!arr.length){const o=document.createElement("option");o.value="";o.textContent=L().savedEmpty;sel.appendChild(o);}
  arr.forEach((it,i)=>{const o=document.createElement("option");o.value=i;o.textContent=`${CATS[it.type]?CATS[it.type].name[lang]:it.type} · ${it.name}`;sel.appendChild(o);});
  $("#savedCount").textContent=L().savedCount(arr.length);
}
function saveCurrent(){
  const name=(prompt(L().saveName,"")||"").trim();if(!name)return;
  const arr=getSaved();
  const item={name,type:state.type,level:state.level,fields:{...state.fields}};
  const dup=arr.findIndex(a=>a.name===name&&a.type===state.type);
  if(dup>=0){if(!confirm(L().overwrite))return;arr[dup]=item;}else arr.push(item);
  setSaved(arr);renderSaved();toast(L().saved);
}
function loadSaved(){
  const v=$("#savedList").value;if(v==="")return;
  const it=getSaved()[+v];if(!it)return;
  state.type=it.type;state.idx=-1;state.custom=true;state.level=it.level||"std";
  state.fields={...it.fields};
  document.querySelectorAll(".lvl").forEach(x=>x.classList.toggle("active",x.dataset.lvl===state.level));
  renderTypes();renderScenarios(true);generate();
}
function delSaved(){
  const v=$("#savedList").value;if(v==="")return;
  const arr=getSaved();arr.splice(+v,1);setSaved(arr);renderSaved();toast(L().deleted);
}

/* ===== 导出工程格式 ===== */
function curVars(p){return[...new Set((p.match(/\{([^}]+)\}/g)||[]).map(s=>s.slice(1,-1)))];}
function exportFoo(){
  const p=$("#output").textContent;
  const vars=curVars(p);
  const promptText=p.replace(/\{([^}]+)\}/g,"{{$1}}");
  const ind=t=>t.split("\n").map(l=>"      "+l).join("\n");
  let y="# promptfoo config — generated by Prompt Studio\n";
  y+="# docs: https://promptfoo.dev\nprompts:\n  - |\n"+ind(promptText)+"\n";
  y+="providers:\n  - openai:gpt-4o-mini\n  - anthropic:messages:claude-3-5-sonnet-latest\n";
  y+="tests:\n  - vars:\n";
  (vars.length?vars:["input"]).forEach(v=>y+=`      ${v}: ""\n`);
  y+='    assert:\n      - type: contains\n        value: ""\n      - type: llm-rubric\n        value: "satisfies the requirements stated in the prompt"\n';
  dlFile("promptfooconfig.yaml",y,"text/yaml");
}
function pyId(v,i){return /^[A-Za-z_][A-Za-z0-9_]*$/.test(v)?v:("var"+(i+1));}
function exportDspy(){
  const p=$("#output").textContent;
  const vars=curVars(p);
  const ins=(vars.length?vars:["input_text"]).map(pyId);
  const doc=(p.split("\n").find(l=>l.trim())||"task").slice(0,90).replace(/"/g,"'");
  let py="import dspy\n\n# Generated by Prompt Studio\n\n";
  py+="class CustomTask(dspy.Signature):\n";
  py+='    """'+doc+'"""\n';
  ins.forEach(v=>py+=`    ${v} = dspy.InputField()\n`);
  py+='    result = dspy.OutputField(desc="model output")\n\n';
  py+="predictor = dspy.ChainOfThought(CustomTask)\n\n";
  py+="# Full prompt as reference instructions:\nINSTRUCTIONS = r'''\n"+p+"\n'''\n";
  dlFile("dspy_task.py",py,"text/x-python");
}

/* ================= 导入并定制 ================= */
const DEFROLE={
  llm:{zh:"你是一位相关领域的资深专家",en:"You are a senior expert in the relevant field"},
  roles:{zh:"我想让你充当相关角色",en:"I want you to act as the relevant role"},
  coding:{zh:"你是一名严谨的工程师，熟悉本项目代码风格",en:"You are a careful engineer familiar with this codebase"},
  automation:{zh:"你是一个可调用工具的自动化 Agent",en:"You are a tool-using automation agent"},
  image:{zh:"高质量、写实风格",en:"high quality, realistic style"},
  prompteng:{zh:"你是提示工程专家",en:"You are a prompt engineering expert"}
};
function detectCat(t){
  const s=t.toLowerCase();
  if(/(系统提示词|system prompt|\brag\b|few-?shot|思维链|chain of thought|dspy|langgpt|提示词评估|promptfoo|提示工程)/.test(s)) return "prompteng";
  if(/(画|图片|图像|绘制|海报|插画|logo|photo|image|render|midjourney|stable diffusion|draw|illustration|portrait|渲染)/.test(s)) return "image";
  if(/(代码|函数|bug|重构|单元测试|报错|编译|接口|代码库|code|function|refactor|debug|compile|repository|unit test|\bsql\b|regex|正则)/.test(s)) return "coding";
  if(/(自动|定时|每天|每日|监控|抓取|爬|工作流|工具调用|批量|流水线|agent|automat|schedule|monitor|crawl|workflow|pipeline|batch)/.test(s)) return "automation";
  if(/(扮演|充当|角色扮演|act as|role.?play)/.test(s)) return "roles";
  return "llm";
}
function splitFields(raw,cat){
  const sents=raw.split(/(?<=[。！？!?;；\n])/).map(s=>s.trim()).filter(Boolean);
  const reRole=/(你是|您是|作为一?[名位个]|act as|you are|you're a)/i;
  const reOut=/(输出|格式|形式|返回|分点|列表|表格|结构|json|markdown|format|output|list|table|bullet)/i;
  const reCons=/(要求|必须|不要|别|禁止|限制|应当?|需要|尽量|避免|简洁|不超过|don't|do not|must|should|avoid|without|concise|no more than|限定)/i;
  const reCtx=/(背景|上下文|目前|现状|已知|项目|场景|针对|关于|context|background|currently|given|about|environment)/i;
  let role="",task=[],ctx=[],cons=[],out=[];
  sents.forEach(s=>{
    if(reRole.test(s)&&!role){role=s;return;}
    if(reOut.test(s)){out.push(s);return;}
    if(reCons.test(s)){cons.push(s);return;}
    if(reCtx.test(s)){ctx.push(s);return;}
    task.push(s);
  });
  const j=a=>a.join(lang==="zh"?"":" ").trim();
  return{role:role||DEFROLE[cat][lang],task:j(task)||raw,context:j(ctx),constraints:j(cons),output:j(out)};
}
function parseImport(){
  const raw=$("#importText").value.trim();
  if(!raw){toast(L().impEmpty);return;}
  let cat=$("#importCat").value; if(cat==="auto") cat=detectCat(raw);
  state.type=cat;state.idx=-1;state.custom=true;
  state.fields=splitFields(raw,cat);
  renderTypes();renderScenarios(true);generate();
  $("#output").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function metaPrompt(){
  const raw=$("#importText").value.trim();
  if(!raw){toast(L().impEmpty);return;}
  const out=$("#output");out.textContent=L().metaWrap(raw);out.dataset.gen="1";
  $("#outTag").textContent=L().metaTag;
  $("#specBody").innerHTML="<ul>"+SPECS[state.type].map(s=>`<li>${s[lang]}</li>`).join("")+"</ul>";
  $("#spec").style.display="block";
  $("#output").scrollIntoView({behavior:"smooth",block:"nearest"});
}

/* 事件 */
$("#impParse").onclick=parseImport;
$("#impMeta").onclick=metaPrompt;
$("#scenario").onchange=e=>{state.idx=+e.target.value;
  if(state.idx<0){state.custom=true;renderFields();}
  else{const wasCustom=state.custom;state.custom=false;wasCustom?renderScenarios(false):loadTemplate();}};
$("#search").oninput=()=>{state.custom=false;renderScenarios(false);};
document.querySelectorAll(".lvl").forEach(el=>el.onclick=()=>{
  document.querySelectorAll(".lvl").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");state.level=el.dataset.lvl;});
$("#gen").onclick=generate;
$("#reset").onclick=loadTemplate;
$("#copy").onclick=()=>copyText($("#output").textContent);
$("#copySpec").onclick=()=>copyText($("#output").textContent+"\n\n=== "+L().specTitle+" ===\n"+specText());
$("#dl").onclick=download;
$("#expFoo").onclick=exportFoo;
$("#expDspy").onclick=exportDspy;
$("#saveBtn").onclick=saveCurrent;
$("#loadBtn").onclick=loadSaved;
$("#delBtn").onclick=delSaved;

/* 初始化 */
renderStatic();renderTypes();renderScenarios(true);generate();
</script>
